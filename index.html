<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>医疗机构耗材与药品库存管理系统</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>
    <div class="app">
        <!-- 侧边栏 -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <i class="fas fa-hospital-symbol"></i>
                </div>
                <div class="brand">
                    <h1>耗材药品库存</h1>
                    <span>智能管理系统</span>
                </div>
            </div>
            <nav class="sidebar-nav">
                <a class="nav-item active" data-view="dashboard">
                    <i class="fas fa-th-large"></i><span>工作台</span>
                </a>
                <a class="nav-item" data-view="inventory">
                    <i class="fas fa-boxes-stacked"></i><span>库存管理</span>
                </a>
                <a class="nav-item" data-view="inbound">
                    <i class="fas fa-truck-ramp-box"></i><span>入库管理</span>
                </a>
                <a class="nav-item" data-view="outbound">
                    <i class="fas fa-cart-shopping"></i><span>出库领用</span>
                </a>
                <a class="nav-item" data-view="expiry">
                    <i class="fas fa-hourglass-half"></i><span>效期预警</span>
                    <span class="badge" id="badge-expiry"></span>
                </a>
                <a class="nav-item" data-view="purchase">
                    <i class="fas fa-clipboard-list"></i><span>采购申请</span>
                    <span class="badge" id="badge-purchase"></span>
                </a>
                <a class="nav-item" data-view="coldchain">
                    <i class="fas fa-temperature-half"></i><span>冷链监控</span>
                    <span class="badge badge-danger" id="badge-cold"></span>
                </a>
                <a class="nav-item" data-view="check">
                    <i class="fas fa-clipboard-check"></i><span>盘点管理</span>
                </a>
                <a class="nav-item" data-view="analysis">
                    <i class="fas fa-chart-line"></i><span>趋势分析</span>
                </a>
            </nav>
            <div class="sidebar-footer">
                <div class="user-box">
                    <div class="avatar"><i class="fas fa-user-nurse"></i></div>
                    <div class="user-info">
                        <strong>张药剂师</strong>
                        <span>药剂科 · 管理员</span>
                    </div>
                </div>
            </div>
        </aside>

        <!-- 主区域 -->
        <div class="main">
            <header class="topbar">
                <div class="topbar-left">
                    <button class="icon-btn" id="toggleSidebar"><i class="fas fa-bars"></i></button>
                    <h2 id="viewTitle">工作台</h2>
                </div>
                <div class="topbar-right">
                    <div class="date-display"><i class="far fa-calendar"></i> <span id="currentDate"></span></div>
                    <button class="icon-btn" id="alertBell" title="实时告警">
                        <i class="fas fa-bell"></i>
                        <span class="dot" id="alertDot" hidden></span>
                    </button>
                </div>
            </header>

            <main class="content" id="content">
                <!-- 视图动态渲染 -->
            </main>
        </div>
    </div>

    <!-- 模态框容器 -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal" id="modal">
            <div class="modal-header">
                <h3 id="modalTitle"></h3>
                <button class="icon-btn" onclick="App.closeModal()"><i class="fas fa-times"></i></button>
            </div>
            <div class="modal-body" id="modalBody"></div>
        </div>
    </div>

    <!-- Toast 容器 -->
    <div class="toast-container" id="toastContainer"></div>

    <!-- 告警浮窗 -->
    <div class="alarm-toast" id="alarmToast">
        <i class="fas fa-triangle-exclamation"></i>
        <div class="alarm-text" id="alarmText"></div>
    </div>

    <script src="js/data.js"></script>
    <script src="js/app.js"></script>
    <script src="js/views.js"></script>
</body>
</html>
